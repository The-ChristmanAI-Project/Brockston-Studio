<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROCKSTON STUDIO // PROFESSIONAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/split.js/1.6.0/split.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --void-black: #030303;
            --panel-black: #0a0a0c;
            --neon-orange: #FF5F1F;
            --neon-glow: 0 0 10px rgba(255, 95, 31, 0.5), 0 0 20px rgba(255, 95, 31, 0.3);
            --border-dim: var(--neon-orange); 
            --text-main: #f0f0f0;
            --font-term: 'Fira Code', 'Menlo', 'Consolas', monospace;
            --font-ui: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: var(--void-black);
            color: var(--text-main);
            font-family: var(--font-term);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #header {
            height: 50px;
            padding: 0 20px;
            border-bottom: 2px solid var(--neon-orange);
            box-shadow: 0 2px 15px rgba(255, 95, 31, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--panel-black);
            flex-shrink: 0;
            font-family: var(--font-ui);
        }

        #header .title {
            color: var(--neon-orange);
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 1.2rem;
            text-shadow: var(--neon-glow);
        }

        #header .status {
            font-size: 0.85rem;
            color: #888;
            font-family: var(--font-term);
        }

        #app-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 50px);
            width: 100%;
            overflow: hidden;
        }

        .split {
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            height: 100%;
        }

        /* GLOWING GUTTER - Handles both vertical and horizontal dragging */
        .gutter {
            background-color: var(--border-dim);
            box-shadow: var(--neon-glow);
            background-repeat: no-repeat;
            background-position: 50%;
            transition: background-color 0.2s;
            z-index: 50; 
        }
        
        .gutter.gutter-horizontal {
            cursor: col-resize;
            width: 4px !important;
            flex-shrink: 0;
        }

        .gutter.gutter-vertical {
            cursor: row-resize;
        }

        .gutter:hover {
            background-color: #fff; 
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        #sidebar {
            background: linear-gradient(180deg, #0f0f12 0%, #050505 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 5px;
            border-right: 1px solid var(--border-dim);
            box-shadow: 2px 0 10px rgba(255, 95, 31, 0.15); 
            min-width: 65px;
            z-index: 10;
        }

        .icon-btn {
            color: #777;
            font-size: 1.4rem;
            margin-bottom: 25px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 10px;
            border-radius: 8px;
            position: relative;
        }

        .icon-btn:hover {
            color: var(--neon-orange);
            background: rgba(255, 95, 31, 0.1);
            transform: scale(1.15);
            box-shadow: inset 0 0 10px rgba(255, 95, 31, 0.1);
        }

        .icon-btn.active {
            color: var(--neon-orange);
            background: rgba(255, 95, 31, 0.15);
            border-left: 3px solid var(--neon-orange);
            text-shadow: var(--neon-glow);
        }

        .icon-btn .tooltip {
            position: absolute;
            left: 65px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--neon-orange);
            color: #000;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-family: var(--font-ui);
            font-weight: 700;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            box-shadow: var(--neon-glow);
        }

        .icon-btn:hover .tooltip {
            opacity: 1;
            transform: translateY(-50%) translateX(5px);
        }

        .sidebar-bottom {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid var(--border-dim);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #explorer {
            background-color: var(--panel-black);
            padding: 15px;
        }

        .explorer-header {
            color: var(--neon-orange);
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-dim);
            padding-bottom: 8px;
            font-weight: 700;
            font-family: var(--font-ui);
            text-shadow: var(--neon-glow);
        }

        .file-item {
            padding: 8px 10px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #999;
            display: flex;
            align-items: center;
            border-radius: 4px;
            transition: all 0.2s;
            margin-bottom: 2px;
        }

        .file-item:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(3px);
        }

        #workspace {
            background-color: var(--void-black);
            display: flex;
            flex-direction: column;
        }

        #editor-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            flex: 1;
        }

        #watermark {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
            background-image: url('/static/family_crest.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 400px;
            height: 400px;
            filter: drop-shadow(0 0 10px rgba(255, 95, 31, 0.2));
        }

        #editor-content {
            position: relative;
            z-index: 1;
            width: 100%;
            flex: 1;
            min-height: 0;
            background: transparent;
        }

        #editor-content .monaco-editor,
        #editor-content .monaco-editor .overflow-guard {
            background: transparent !important;
        }

        #terminal-container {
            background: #020202;
            padding: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        #terminal { flex: 1; }

        #ai-panel {
            background-color: var(--panel-black);
            display: flex;
            flex-direction: column;
        }

        #chat-history {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 0.95rem;
        }

        .msg {
            margin-bottom: 18px;
            line-height: 1.6;
            padding: 12px 15px;
            border-radius: 8px;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.user {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid #555;
        }

        .msg.ai {
            color: #fff;
            background: rgba(255, 95, 31, 0.08);
            border-left: 3px solid var(--neon-orange);
            box-shadow: 0 2px 10px rgba(255, 95, 31, 0.05);
        }

        .msg.error {
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            border-left: 3px solid #ff4444;
        }

        .ai-header {
            color: var(--neon-orange);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            text-shadow: 0 0 5px rgba(255, 95, 31, 0.4);
        }

        .system-tag {
            color: #00B4D8;
            font-size: 0.75rem;
            margin-bottom: 10px;
            display: block;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(0, 180, 216, 0.5);
        }

        #chat-input-area {
            padding: 20px;
            border-top: 1px solid var(--border-dim);
            display: flex;
            gap: 12px;
            background: #080808;
            box-shadow: 0 -5px 15px rgba(255, 95, 31, 0.05);
        }

        #chat-input {
            flex: 1;
            background: #111;
            border: 1px solid var(--border-dim);
            color: white;
            padding: 14px;
            font-family: var(--font-term);
            font-size: 0.95rem;
            outline: none;
            border-radius: 6px;
            transition: all 0.3s;
        }

        #chat-input:focus {
            border-color: var(--neon-orange);
            box-shadow: 0 0 10px rgba(255, 95, 31, 0.3);
            background: #1a1a1a;
        }

        #send-btn {
            background: var(--neon-orange);
            color: #000;
            border: none;
            padding: 0 25px;
            font-weight: 700;
            font-family: var(--font-ui);
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(255, 95, 31, 0.4);
        }

        #send-btn:hover {
            background: #ff7f4d;
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 95, 31, 0.6);
        }
        
        audio { display: none; }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="/static/focus_music.mp3" type="audio/mpeg">
    </audio>
    <audio id="tts-player"></audio>

    <div id="header">
        <span class="title"><i class="fas fa-bolt" style="margin-right: 8px;"></i>BROCKSTON STUDIO // PROFESSIONAL</span>
        <span class="status">HOST: 127.0.0.1 : 7777</span>
    </div>

    <div id="app-container">
        <div id="sidebar">
            <div class="icon-btn active" title="Code Editor">
                <i class="fas fa-code"></i>
                <span class="tooltip">Code Editor</span>
            </div>
            <div class="icon-btn" title="Terminal">
                <i class="fas fa-terminal"></i>
                <span class="tooltip">Terminal</span>
            </div>
            <div class="icon-btn" title="Git">
                <i class="fab fa-git-alt"></i>
                <span class="tooltip">Git</span>
            </div>
            
            <div class="sidebar-bottom">
                <div class="icon-btn" id="btn-music" title="Background Music">
                    <i class="fas fa-music"></i>
                    <span class="tooltip">Focus Music</span>
                </div>
                <div class="icon-btn" id="btn-voice" title="Voice Mode">
                    <i class="fas fa-volume-up"></i>
                    <span class="tooltip">Voice Mode (Off)</span>
                </div>
                <div class="icon-btn" title="Settings">
                    <i class="fas fa-cog"></i>
                    <span class="tooltip">Settings</span>
                </div>
            </div>
        </div>

        <div id="explorer" class="split">
            <div class="explorer-header"><i class="fas fa-folder-open" style="margin-right: 5px;"></i> PROJECT EXPLORER</div>
            <div id="file-list">
                <div style="color: #444; font-style: italic;">Loading...</div>
            </div>
        </div>

        <div id="workspace" class="split">
            <div id="editor-wrapper">
                <div id="watermark"></div>
                <div id="editor-content"></div>
                <div id="editor-placeholder" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#444;font-style:italic;pointer-events:none;z-index:2;">// Select a file to begin coding...</div>
            </div>
            <div id="terminal-container">
                <div id="terminal"></div>
            </div>
        </div>

        <div id="ai-panel" class="split">
            <div class="explorer-header" style="padding: 15px 20px 0;"><i class="fas fa-brain" style="margin-right: 5px;"></i> ASK BROCKSTON / ULTIMATE_EV</div>
            <div id="chat-history">
                <span class="system-tag">[SYSTEM]: Neural Link Active. Ready to help you learn.</span>
            </div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Ask a question..." autocomplete="off">
                <button id="send-btn">SEND</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // BROCKSTON Studio — Board logic
        // ============================================================

        // ----- Layout: column splits + vertical editor/terminal split
        Split(['#explorer', '#workspace', '#ai-panel'], {
            sizes: [15, 55, 30],
            minSize: [150, 300, 280],
            gutterSize: 4,
            cursor: 'col-resize'
        });

        Split(['#editor-wrapper', '#terminal-container'], {
            direction: 'vertical',
            sizes: [65, 35],
            minSize: [100, 100],
            gutterSize: 4,
            cursor: 'row-resize'
        });

        const API_BASE = window.location.origin + "/api";
        const WS_URL = (window.location.protocol === 'https:' ? 'wss://' : 'ws://')
            + window.location.host + "/ws/terminal";

        // ----- DOM refs
        const chatInput   = document.getElementById('chat-input');
        const chatHistory = document.getElementById('chat-history');
        const sendBtn     = document.getElementById('send-btn');
        const fileList    = document.getElementById('file-list');
        const placeholder = document.getElementById('editor-placeholder');
        const bgMusic     = document.getElementById('bg-music');
        const ttsPlayer   = document.getElementById('tts-player');
        const btnMusic    = document.getElementById('btn-music');
        const btnVoice    = document.getElementById('btn-voice');

        let isMusicPlaying = false;
        let isVoiceModeEnabled = false;
        let currentPath = '';
        let currentFile = null;
        let monacoEditor = null;

        // ----- Music toggle
        btnMusic.addEventListener('click', () => {
            if (isMusicPlaying) {
                bgMusic.pause();
                btnMusic.classList.remove('active');
                btnMusic.querySelector('i').className = 'fas fa-music';
            } else {
                bgMusic.volume = 0.2;
                bgMusic.play().catch(e => console.log("Audio blocked:", e));
                btnMusic.classList.add('active');
                btnMusic.querySelector('i').className = 'fas fa-pause-circle';
            }
            isMusicPlaying = !isMusicPlaying;
        });

        // ----- Voice toggle
        btnVoice.addEventListener('click', () => {
            isVoiceModeEnabled = !isVoiceModeEnabled;
            if (isVoiceModeEnabled) {
                btnVoice.classList.add('active');
                btnVoice.querySelector('.tooltip').innerText = 'Voice Mode (On)';
                appendMessage('SYSTEM', 'Voice Mode Activated.', 'system');
            } else {
                btnVoice.classList.remove('active');
                btnVoice.querySelector('.tooltip').innerText = 'Voice Mode (Off)';
                ttsPlayer.pause();
            }
        });

        async function speakText(text) {
            if (!isVoiceModeEnabled) return;
            try {
                const res = await fetch(`${API_BASE}/speech/synthesize`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({text})
                });
                if (!res.ok) throw new Error("Speech synth failed");
                const blob = await res.blob();
                ttsPlayer.src = URL.createObjectURL(blob);
                ttsPlayer.play();
            } catch (err) {
                console.error("TTS error:", err);
            }
        }

        // ----- Chat
        async function sendChat() {
            const text = chatInput.value.trim();
            if (!text) return;
            appendMessage('YOU', text, 'user');
            chatInput.value = '';
            try {
                const res = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text})
                });
                if (!res.ok) throw new Error(`Server error: ${res.status}`);
                const data = await res.json();
                appendMessage('BROCKSTON', data.response, 'ai');
                speakText(String(data.response).replace(/\[.*?\]/g, ''));
            } catch (err) {
                console.error(err);
                appendMessage('SYSTEM', `[ERROR]: ${err.message}`, 'error');
            }
        }

        function appendMessage(sender, text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            let icon = 'fa-user';
            if (type === 'ai')     icon = 'fa-robot';
            if (type === 'system' || type === 'error') icon = 'fa-server';
            div.innerHTML = `<div class="ai-header"><i class="fas ${icon}"></i> ${sender}</div> ${escapeHtml(text)}`;
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        sendBtn.addEventListener('click', sendChat);
        chatInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendChat(); });

        // ----- File explorer
        async function loadFiles(path = '') {
            try {
                const url = path
                    ? `${API_BASE}/files?path=${encodeURIComponent(path)}`
                    : `${API_BASE}/files`;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                currentPath = path;
                fileList.innerHTML = '';

                if (currentPath !== '') {
                    const backBtn = document.createElement('div');
                    backBtn.className = 'file-item';
                    backBtn.innerHTML = `<i class="fas fa-level-up-alt"></i> ..`;
                    backBtn.onclick = () => {
                        const parts = currentPath.split('/').filter(p => p);
                        parts.pop();
                        loadFiles(parts.join('/'));
                    };
                    fileList.appendChild(backBtn);
                }

                (data.files || []).forEach(file => {
                    const el = document.createElement('div');
                    el.className = 'file-item';
                    const icon  = file.type === 'folder' ? 'fa-folder' : 'fa-file-code';
                    const color = file.type === 'folder' ? '#FF5F1F'  : '#00B4D8';
                    el.innerHTML = `<i class="fas ${icon}" style="color:${color}"></i> ${escapeHtml(file.name)}`;
                    if (file.type === 'file') {
                        el.onclick = () => openFile(currentPath ? currentPath + '/' + file.name : file.name);
                    } else {
                        el.onclick = () => loadFiles(currentPath ? currentPath + '/' + file.name : file.name);
                    }
                    fileList.appendChild(el);
                });
            } catch (err) {
                fileList.innerHTML = `<div style="color:#ff6b6b;padding:10px;">Failed to load files: ${escapeHtml(err.message)}</div>`;
            }
        }

        function languageFromName(name) {
            const ext = name.split('.').pop().toLowerCase();
            const map = {
                py:'python', js:'javascript', ts:'typescript', json:'json',
                html:'html', css:'css', md:'markdown', sh:'shell', yml:'yaml',
                yaml:'yaml', c:'c', cpp:'cpp', h:'c', rs:'rust', go:'go',
                java:'java', rb:'ruby', php:'php', sql:'sql', xml:'xml', toml:'ini'
            };
            return map[ext] || 'plaintext';
        }

        async function openFile(filepath) {
            try {
                const res = await fetch(`${API_BASE}/read_file?filename=${encodeURIComponent(filepath)}`);
                if (!res.ok) throw new Error("Read failed");
                const data = await res.json();
                currentFile = filepath;
                if (placeholder) placeholder.style.display = 'none';
                if (monacoEditor) {
                    monacoEditor.setValue(data.content || '');
                    monaco.editor.setModelLanguage(monacoEditor.getModel(), languageFromName(filepath));
                }
            } catch (err) {
                alert("Cannot read file: " + err.message);
            }
        }

        // ----- Monaco editor
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
            monaco.editor.defineTheme('brockston-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [],
                colors: {
                    'editor.background': '#030303',
                    'editor.foreground': '#f8f8f2',
                    'editorCursor.foreground': '#FF5F1F',
                    'editor.lineHighlightBackground': '#0a0a0c',
                    'editorLineNumber.foreground': '#444',
                    'editorLineNumber.activeForeground': '#FF5F1F',
                    'editor.selectionBackground': '#FF5F1F33'
                }
            });
            monacoEditor = monaco.editor.create(document.getElementById('editor-content'), {
                value: '',
                language: 'plaintext',
                theme: 'brockston-dark',
                automaticLayout: true,
                fontFamily: "'Fira Code', 'Menlo', 'Consolas', monospace",
                fontSize: 14,
                lineHeight: 22,
                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                renderLineHighlight: 'all',
                cursorBlinking: 'smooth'
            });
            window.addEventListener('keydown', e => {
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    // Save is a no-op until /api/write_file exists; flag clearly.
                    appendMessage('SYSTEM', 'Save not yet wired to backend (/api/write_file pending).', 'system');
                }
            });
        });

        // ----- Terminal (xterm.js + websocket)
        const term = new Terminal({
            theme: {
                background: '#020202',
                foreground: '#f8f8f2',
                cursor: '#FF5F1F',
                selectionBackground: 'rgba(255, 95, 31, 0.3)'
            },
            fontFamily: "'Fira Code', 'Menlo', 'Consolas', monospace",
            fontSize: 14,
            cursorBlink: true
        });
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        term.open(document.getElementById('terminal'));
        fitAddon.fit();
        new ResizeObserver(() => { try { fitAddon.fit(); } catch (e) {} })
            .observe(document.getElementById('terminal-container'));

        let ws = null;
        let reconnectAttempts = 0;
        const MAX_RECONNECT = 5;

        function connectWebSocket() {
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                reconnectAttempts = 0;
                term.write('\r\n\x1b[1;32m[SYSTEM]: UPLINK ESTABLISHED.\x1b[0m\r\n');
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'output') {
                        let clean = msg.data
                            .replace(/\[\?2004h/g, '')
                            .replace(/\[\?2004l/g, '');
                        term.write(clean);
                    }
                } catch (err) {
                    console.error('Parse error:', err);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onclose = () => {
                term.write('\r\n\x1b[1;33m[SYSTEM]: CONNECTION LOST.\x1b[0m\r\n');
                if (reconnectAttempts < MAX_RECONNECT) {
                    const delay = 1000 * Math.pow(2, reconnectAttempts);
                    reconnectAttempts++;
                    term.write(`\x1b[1;33m[SYSTEM]: Reconnecting in ${delay/1000}s (${reconnectAttempts}/${MAX_RECONNECT})...\x1b[0m\r\n`);
                    setTimeout(connectWebSocket, delay);
                } else {
                    term.write('\x1b[1;31m[ERROR]: Max reconnects reached. Refresh the page.\x1b[0m\r\n');
                }
            };
        }

        connectWebSocket();

        term.onData(data => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: 'input', data}));
            }
        });

        // ----- Boot
        loadFiles();
        window.addEventListener('focus', () => term.focus());
    </script>

    <!-- Core app script, no Claude hook -->
    <!-- app.js intentionally not loaded: its loadFiles() conflicted with the inline
         implementation above and silently failed because of an undefined `elements`
         reference, leaving the file explorer stuck on "Loading...". Inline JS is
         the canonical board logic. -->
