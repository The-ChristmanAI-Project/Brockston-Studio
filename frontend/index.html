<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BROCKSTON Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --success: #3fb950;
            --error: #f85149;
            --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
        }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-mono);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* Header */
        #header {
            height: 48px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
            flex-shrink: 0;
        }
        #header .logo {
            color: var(--accent);
            font-weight: bold;
            font-size: 14px;
        }
        #header .file-path {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 6px;
            font-family: var(--font-mono);
            font-size: 13px;
        }
        #header .file-path:focus {
            outline: none;
            border-color: var(--accent);
        }
        #header .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
        }
        #header .btn:hover { background: var(--accent-hover); }
        #header .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        #header .btn-secondary:hover { background: var(--border); }
        /* Main Layout */
        #main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        /* Sidebar */
        #sidebar {
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        #sidebar-header {
            padding: 12px 16px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
        }
        #file-tree {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px;
        }
        .tree-item {
            display: flex;
            align-items: center;
            padding: 6px 8px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
            gap: 8px;
        }
        .tree-item:hover { background: var(--bg-tertiary); }
        .tree-item.active { background: var(--bg-tertiary); color: var(--accent); }
        .tree-item i { width: 16px; text-align: center; font-size: 12px; }
        .tree-item.folder { color: var(--text-secondary); }
        .tree-item.file { color: var(--text-primary); }
        .tree-indent { margin-left: 16px; }
        /* Editor Area */
        #editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        #editor-tabs {
            height: 36px;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 8px;
            flex-shrink: 0;
        }
        #editor-tabs .tab {
            padding: 6px 12px;
            background: var(--bg-secondary);
            border-radius: 4px 4px 0 0;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 2px solid var(--accent);
        }
        #editor-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        #editor {
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: none;
            padding: 16px;
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            tab-size: 4;
        }
        /* Line numbers */
        #line-numbers {
            position: absolute;
            left: 0;
            top: 0;
            width: 48px;
            height: 100%;
            background: var(--bg-primary);
            border-right: 1px solid var(--border);
            padding: 16px 8px;
            text-align: right;
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
            user-select: none;
            overflow: hidden;
        }
        #editor-wrapper {
            position: absolute;
            left: 48px;
            top: 0;
            right: 0;
            bottom: 0;
        }
        #editor {
            width: 100%;
            height: 100%;
        }
        /* Terminal */
        #terminal-panel {
            height: 200px;
            border-top: 1px solid var(--border);
            background: var(--bg-primary);
            flex-shrink: 0;
        }
        /* AI Panel */
        #ai-panel {
            width: 350px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        #ai-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        #ai-tabs button {
            flex: 1;
            padding: 10px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 12px;
            border-bottom: 2px solid transparent;
        }
        #ai-tabs button.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        #ai-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-msg {
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
            max-width: 90%;
        }
        .chat-msg.user {
            background: var(--bg-tertiary);
            align-self: flex-end;
        }
        .chat-msg.assistant {
            background: rgba(88, 166, 255, 0.1);
            align-self: flex-start;
            border-left: 3px solid var(--accent);
        }
        .chat-msg.system {
            background: transparent;
            color: var(--text-secondary);
            font-size: 11px;
            align-self: center;
        }
        .chat-msg.error {
            background: rgba(248, 81, 73, 0.1);
            color: var(--error);
        }
        #chat-input-area {
            padding: 12px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }
        #chat-input {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            font-family: var(--font-mono);
            font-size: 13px;
            resize: none;
            height: 40px;
        }
        #chat-input:focus { outline: none; border-color: var(--accent); }
        #send-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        #send-btn:hover { background: var(--accent-hover); }
        /* Status bar */
        #statusbar {
            height: 24px;
            background: var(--accent);
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 11px;
            color: #fff;
            flex-shrink: 0;
        }
        #statusbar .status-item { margin-right: 16px; }
        /* Loading overlay */
        #loading {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        #loading.active { display: flex; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }
    </style>
</head>
<body>
    <!-- Header -->
    <div id="header">
        <span class="logo"><i class="fas fa-code"></i> BROCKSTON</span>
        <input type="text" id="file-path-input" class="file-path" placeholder="Enter file path or click a file in the explorer...">
        <button class="btn" id="btn-open">Open</button>
        <button class="btn btn-secondary" id="btn-save"><i class="fas fa-save"></i> Save</button>
    </div>

    <!-- Main Layout -->
    <div id="main">
        <!-- Sidebar - File Explorer -->
        <div id="sidebar">
            <div id="sidebar-header">EXPLORER</div>
            <div id="file-tree"></div>
        </div>

        <!-- Editor Area -->
        <div id="editor-area">
            <div id="editor-tabs">
                <div class="tab" id="current-tab">
                    <i class="fas fa-file-code"></i>
                    <span id="tab-filename">No file open</span>
                </div>
            </div>
            <div id="editor-container">
                <div id="line-numbers">1</div>
                <div id="editor-wrapper">
                    <textarea id="editor" spellcheck="false" placeholder="// Open a file to start editing..."></textarea>
                </div>
            </div>
            <div id="terminal-panel">
                <div id="terminal"></div>
            </div>
        </div>

        <!-- AI Panel -->
        <div id="ai-panel">
            <div id="ai-tabs">
                <button class="active" data-tab="brockston">BROCKSTON</button>
                <button data-tab="claude">CLAUDE</button>
            </div>
            <div id="ai-content">
                <div id="chat-messages">
                    <div class="chat-msg system">Welcome to BROCKSTON Studio. Open a file and start coding!</div>
                </div>
                <div id="chat-input-area">
                    <textarea id="chat-input" placeholder="Ask BROCKSTON about your code..."></textarea>
                    <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div id="statusbar">
        <span class="status-item" id="status-text">Ready</span>
        <span class="status-item" id="status-lang">Plain Text</span>
        <span class="status-item" id="status-pos">Ln 1, Col 1</span>
    </div>

    <!-- Loading Overlay -->
    <div id="loading"><div class="spinner"></div></div>

    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="hooks/useClaude.js"></script>
    <script>
    // ============================================
    // BROCKSTON Studio - Main Application
    // ============================================

    const API = window.location.origin + '/api';
    const WS = (window.location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + window.location.host + '/ws/terminal';

    // State
    let currentFile = null;
    let chatHistory = [];
    let terminal = null;
    let termSocket = null;
    let claudeHook = null;

    // DOM
    const $ = id => document.getElementById(id);
    const editor = $('editor');
    const lineNumbers = $('line-numbers');
    const fileTree = $('file-tree');
    const chatMessages = $('chat-messages');
    const chatInput = $('chat-input');
    const statusText = $('status-text');
    const statusLang = $('status-lang');
    const statusPos = $('status-pos');
    const tabFilename = $('tab-filename');
    const loading = $('loading');

    // Show/hide loading
    function showLoading() { loading.classList.add('active'); }
    function hideLoading() { loading.classList.remove('active'); }

    // Add chat message
    function addChat(text, type = 'assistant') {
        const div = document.createElement('div');
        div.className = `chat-msg ${type}`;
        div.textContent = text;
        chatMessages.appendChild(div);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Update line numbers
    function updateLineNumbers() {
        const lines = editor.value.split('\n');
        lineNumbers.innerHTML = lines.map((_, i) => i + 1).join('<br>');
    }

    // Update cursor position
    function updateCursorPosition() {
        const text = editor.value.substring(0, editor.selectionStart);
        const lines = text.split('\n');
        const ln = lines.length;
        const col = lines[lines.length - 1].length + 1;
        statusPos.textContent = `Ln ${ln}, Col ${col}`;
    }

    // Detect language from extension
    function detectLanguage(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        const map = {
            py: 'Python', js: 'JavaScript', ts: 'TypeScript', jsx: 'JavaScript', tsx: 'TypeScript',
            html: 'HTML', css: 'CSS', json: 'JSON', md: 'Markdown', sh: 'Shell',
            c: 'C', cpp: 'C++', java: 'Java', go: 'Go', rs: 'Rust', rb: 'Ruby',
            php: 'PHP', sql: 'SQL', yaml: 'YAML', yml: 'YAML', xml: 'XML'
        };
        return map[ext] || 'Plain Text';
    }

    // Open file
    async function openFile(path) {
        showLoading();
        try {
            const res = await fetch(`${API}/read_file?filename=${encodeURIComponent(path)}`);
            if (!res.ok) throw new Error('Failed to open file');
            const data = await res.json();
            editor.value = data.content;
            currentFile = path;
            tabFilename.textContent = path.split('/').pop();
            statusLang.textContent = detectLanguage(path);
            updateLineNumbers();
            addChat(`Opened: ${path}`, 'system');
            statusText.textContent = 'Ready';
        } catch (err) {
            addChat(err.message, 'error');
        }
        hideLoading();
    }

    // Save file
    async function saveFile() {
        if (!currentFile) {
            addChat('No file open. Open a file first.', 'error');
            return;
        }
        showLoading();
        try {
            const res = await fetch(`${API}/files/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: currentFile, content: editor.value })
            });
            if (!res.ok) throw new Error('Failed to save');
            addChat('File saved!', 'system');
            statusText.textContent = 'Saved';
        } catch (err) {
            addChat(err.message, 'error');
        }
        hideLoading();
    }

    // Load file tree
    async function loadFileTree(path = '') {
        try {
            const res = await fetch(`${API}/files?path=${encodeURIComponent(path)}`);
            const data = await res.json();
            fileTree.innerHTML = '';

            // Back button
            if (path) {
                const back = document.createElement('div');
                back.className = 'tree-item folder';
                back.innerHTML = '<i class="fas fa-arrow-left"></i> ..';
                back.onclick = () => {
                    const parts = path.split('/').filter(Boolean);
                    parts.pop();
                    loadFileTree(parts.join('/'));
                };
                fileTree.appendChild(back);
            }

            (data.files || []).forEach(f => {
                const item = document.createElement('div');
                item.className = `tree-item ${f.type}`;
                const icon = f.type === 'folder' ? 'fa-folder' : 'fa-file-code';
                item.innerHTML = `<i class="fas ${icon}"></i> ${f.name}`;
                const fullPath = path ? `${path}/${f.name}` : f.name;
                if (f.type === 'file') {
                    item.onclick = () => openFile(fullPath);
                } else {
                    item.onclick = () => loadFileTree(fullPath);
                }
                fileTree.appendChild(item);
            });
        } catch (err) {
            console.error('Failed to load files:', err);
        }
    }

    // Ask BROCKSTON
    async function askBrockston(question) {
        if (!question.trim()) return;
        addChat(question, 'user');
        chatInput.value = '';
        showLoading();

        try {
            const code = editor.value;
            const res = await fetch(`${API}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: question })
            });
            const data = await res.json();
            addChat(data.response, 'assistant');
        } catch (err) {
            addChat('Failed to communicate with BROCKSTON', 'error');
        }
        hideLoading();
    }

    // Terminal
    function initTerminal() {
        terminal = new Terminal({
            theme: { background: '#0d1117', foreground: '#e6edf3', cursor: '#58a6ff' },
            fontFamily: 'Cascadia Code, Consolas, monospace',
            fontSize: 13,
            cursorBlink: true,
            scrollback: 1000
        });
        const fitAddon = new FitAddon.FitAddon();
        terminal.loadAddon(fitAddon);
        terminal.open($('terminal'));
        fitAddon.fit();

        termSocket = new WebSocket(WS);
        termSocket.onopen = () => {
            terminal.writeln('\x1b[1;32m✓ Terminal connected\x1b[0m');
            terminal.onData(data => {
                termSocket.send(JSON.stringify({ type: 'input', data }));
            });
        };
        termSocket.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'output') terminal.write(msg.data);
        };
        termSocket.onclose = () => terminal.writeln('\x1b[1;33m⚠ Terminal disconnected\x1b[0m');

        window.addEventListener('resize', () => fitAddon.fit());
    }

    // Event Listeners
    $('btn-open').onclick = () => {
        const path = $('file-path-input').value.trim();
        if (path) openFile(path);
    };
    $('file-path-input').onkeypress = (e) => { if (e.key === 'Enter') $('btn-open').click(); };
    $('btn-save').onclick = saveFile;
    $('send-btn').onclick = () => askBrockston(chatInput.value);
    chatInput.onkeypress = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); $('send-btn').click(); } };

    editor.oninput = updateLineNumbers;
    editor.onscroll = () => { lineNumbers.scrollTop = editor.scrollTop; };
    editor.onkeyup = updateCursorPosition;
    editor.onclick = updateCursorPosition;

    // AI tabs
    document.querySelectorAll('#ai-tabs button').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('#ai-tabs button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            saveFile();
        }
    });

    // Tab key in editor
    editor.addEventListener('keydown', (e) => {
        if (e.key === 'Tab') {
            e.preventDefault();
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
            editor.selectionStart = editor.selectionEnd = start + 4;
            updateLineNumbers();
        }
    });

    // Init
    claudeHook = useClaude();
    initTerminal();
    loadFileTree();
    updateLineNumbers();

    console.log('BROCKSTON Studio initialized');
    </script>
</body>
</html>
